<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Δήλωση Ενδιαφέροντος – Elena Polivkina</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500&family=Noto+Sans:wght@300;400&display=swap" rel="stylesheet">
<script async src="https://tally.so/widgets/embed.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cypress: #1A3A2A;
    --cypress-deep: #0f2218;
    --gold: #C9A84C;
    --gold-light: #F0D78B;
    --white: #ffffff;
  }

  html, body {
    font-family: 'Jost', sans-serif;
    background-color: var(--cypress-deep);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .phone-wrapper {
    max-width: 430px;
    min-height: 100vh;
    margin: 0 auto;
    background: var(--cypress);
    position: relative;
  }

  @media (min-width: 500px) {
    body {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 0;
    }
    .phone-wrapper {
      min-height: auto;
      border-radius: 28px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.06),
        0 32px 80px rgba(0,0,0,0.6),
        0 8px 24px rgba(0,0,0,0.4);
    }
  }

  .hero {
    position: relative;
    width: 100%;
    height: 48vh;
    max-height: 380px;
    overflow: hidden;
  }

  .hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 12%;
    display: block;
  }

  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(26,58,42,0.1) 0%,
      rgba(26,58,42,0.55) 65%,
      var(--cypress) 100%
    );
  }

  .content {
    position: relative;
    padding: 0 22px 52px;
    background: var(--cypress);
    text-align: center;
  }

  .content::before {
    content: '';
    position: absolute;
    top: -40px; left: 50%; transform: translateX(-50%);
    width: 240px; height: 240px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,168,76,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .label-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 14px;
    padding-top: 28px;
  }

  .label-tag::before, .label-tag::after {
    content: '';
    display: block;
    width: 16px;
    height: 1px;
    background: var(--gold);
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 600;
    line-height: 1.12;
    color: var(--white);
    margin-bottom: 6px;
  }

  h1 span {
    display: block;
    background: linear-gradient(90deg, var(--gold) 0%, var(--gold-light) 55%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-style: italic;
  }

  .presenter {
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.8);
    margin-bottom: 24px;
  }

  .dates-row {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }

  .date-badge {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.28);
    border-radius: 8px;
    padding: 10px 20px;
  }

  .date-badge .day {
    font-family: 'Cormorant Garamond', serif;
    font-size: 30px;
    font-weight: 600;
    color: var(--gold-light);
    line-height: 1;
  }

  .date-badge .month {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(201,168,76,0.65);
    margin-top: 2px;
  }

  .date-amp {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    color: rgba(201,168,76,0.35);
  }

  .online-tag {
    display: block;
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.28);
    margin-bottom: 28px;
  }

  .divider {
    width: 36px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 0 auto 24px;
  }

  .form-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 22px 16px 16px;
    position: relative;
    text-align: left;
  }

  .form-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.45), transparent);
    border-radius: 14px 14px 0 0;
  }

  .form-intro {
    font-size: 12px;
    font-weight: 300;
    font-family: 'Noto Sans', sans-serif;
    color: rgba(255,255,255,0.38);
    margin-bottom: 16px;
    line-height: 1.7;
    text-align: center;
  }

</style>
</head>
